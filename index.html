<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Task Tracker</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrapper">
    <div class="controls">
        <button class="btn-add" onclick="addTask()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Add Task
        </button>
        <button class="btn-pdf" onclick="generatePDF()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Export to PDF
        </button>
    </div>

    <div id="pdf-content">
        <div class="header-section">
            <h1>Write Down Your Tasks Below - A simple way to manage work</h1>
            <div class="date-stamp" id="currentDate"></div>
        </div>
        <div class="task-list" id="taskList">
            </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
